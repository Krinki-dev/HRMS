<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"></head>
<body style="font-family: Arial, sans-serif; background: #F9FAFB; padding: 20px;">
  <div style="max-width: 600px; margin: 0 auto; background: white; border-radius: 8px; padding: 30px;">
    <h2 style="color: #1E40AF;">Reset your password</h2>
    <p>Hi {{name}},</p>
    <p>We received a request to reset your password. Click the button below to set a new one. This link expires in 1 hour.</p>
    <a href="{{resetLink}}" style="display: inline-block; background: #1E40AF; color: white; padding: 12px 24px; border-radius: 6px; text-decoration: none;">Reset Password</a>
    <p style="margin-top: 20px;">Or copy this link: <br><span style="word-break: break-all;">{{resetLink}}</span></p>
    <p>If you didn't request this, you can ignore this email.</p>
  </div>
</body>
</html>
